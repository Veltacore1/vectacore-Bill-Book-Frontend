name: Frontend Container CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/veltacore1/vectacore-bill-book-frontend

jobs:
  build-publish:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Validate production API URL
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "Set repository variable VITE_API_URL before publishing the production frontend image."
            exit 1
          fi
          case "$VITE_API_URL" in
            http://localhost*|http://127.0.0.1*|http://0.0.0.0*|http://\[::1\]*)
              echo "VITE_API_URL must not point to localhost for production images."
              exit 1
              ;;
            https://*)
              ;;
            *)
              echo "VITE_API_URL must use HTTPS for production images."
              exit 1
              ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
