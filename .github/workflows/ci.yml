name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://127.0.0.1:8001/api/v1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan
        run: python3 scripts/check_no_secrets.py --self-test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Render Nginx config
        env:
          VITE_API_URL: https://api.vastrabook.in/api/v1
        run: npm run render:nginx

      - name: Validate Nginx config
        run: >
          docker run --rm
          -v "${{ github.workspace }}/build/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
          nginx:1.27-alpine
          nginx -t

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error
